<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 250">
    <g transform="translate(30, 20)">
        <!-- Back square -->
        <rect x="25" y="25" width="160" height="160" fill="#154B86" />
        <rect x="35" y="35" width="140" height="140" fill="none" stroke="#ffffff" stroke-width="4" />
        
        <!-- White spacer between squares to create the cutout illusion -->
        <path d="M 25 25 L 185 25 L 185 185 L 25 185 Z" fill="none" stroke="#ffffff" stroke-width="8" />

        <!-- Front square -->
        <rect x="0" y="0" width="160" height="160" fill="#154B86" />
        <rect x="10" y="10" width="140" height="140" fill="none" stroke="#ffffff" stroke-width="4" />
        
        <!-- Window pane lines -->
        <!-- Horizontal line -->
        <line x1="10" y1="80" x2="150" y2="80" stroke="#ffffff" stroke-width="5" />
        <!-- Top vertical line -->
        <line x1="80" y1="10" x2="80" y2="80" stroke="#ffffff" stroke-width="5" />
        <!-- Bottom left vertical line -->
        <line x1="45" y1="80" x2="45" y2="115" stroke="#ffffff" stroke-width="5" />
        <!-- Bottom right vertical line -->
        <line x1="115" y1="80" x2="115" y2="115" stroke="#ffffff" stroke-width="5" />
        
        <!-- V-TECH Text -->
        <text x="80" y="142" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="28" fill="#ffffff" letter-spacing="1">V-TECH</text>
    </g>
    
    <!-- Colon -->
    <circle cx="250" cy="110" r="6" fill="#000000" />
    <circle cx="250" cy="135" r="6" fill="#000000" />
    
    <!-- Fundermax text -->
    <text x="290" y="130" font-family="'Arial', 'Helvetica', sans-serif" font-weight="600" font-size="95" fill="#000000" letter-spacing="2">Fundermax</text>
    
    <!-- Subtitle -->
    <text x="300" y="185" font-family="'Arial', 'Segoe UI', sans-serif" font-size="38" font-weight="500" fill="#111111" letter-spacing="0.5">For you to create</text>
</svg>