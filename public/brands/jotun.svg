<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250">
    <!-- Red top border -->
    <rect x="100" y="50" width="300" height="12" fill="#E31837" />
    <!-- Orange box -->
    <rect x="100" y="62" width="300" height="78" fill="#F8A000" />
    
    <!-- Penguin globe mockup -->
    <circle cx="150" cy="101" r="22" fill="#ffffff" stroke="#00205B" stroke-width="2" />
    <!-- Grid lines on globe -->
    <path d="M 128 101 L 172 101 M 150 79 L 150 123" stroke="#00205B" stroke-width="2" />
    <!-- Penguin body -->
    <ellipse cx="150" cy="101" rx="10" ry="18" fill="#00205B" />
    <ellipse cx="150" cy="107" rx="7" ry="12" fill="#ffffff" />
    <circle cx="150" cy="86" r="6" fill="#00205B" />

    <!-- JOTUN text -->
    <text x="270" y="125" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="65" fill="#00205B" letter-spacing="2">JOTUN</text>
    
    <!-- Powder coatings text below -->
    <text x="250" y="200" text-anchor="middle" font-family="'Arial Black', 'Arial', sans-serif" font-size="28" font-weight="900" fill="#00205B" letter-spacing="2">POWDER COATINGS</text>
</svg>